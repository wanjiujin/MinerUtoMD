# MinerUtoMD 配置模板
#
# 这个文件只保存可复用的默认配置，不写入某一台电脑专属的 D 盘路径。
# 首次部署时请运行:
#   python MinerUtoMD/init_environment.py --write-config
# 脚本会自动探测本机 Python/MinerU/Pandoc/wkhtmltopdf 路径，并按需生成本机配置。

# MinerU 配置
mineru:
  # 输出格式: markdown, json, content_list
  output_format: "markdown"
  # 是否保留图片
  keep_images: true
  # 图片输出目录名
  image_dir: "images"
  # 是否启用OCR（扫描件PDF需要）
  enable_ocr: true
  # OCR语言
  ocr_lang: "ch"  # ch=中文, en=英文
  # 解析方法: auto, txt, ocr
  parse_method: "auto"
  # 是否启用公式识别（需要 MinerU 3.x）
  enable_formula: true
  # 是否启用表格识别
  enable_table: false
  # 后端: pipeline (本地模型), hybrid-auto-engine (需要VLM模型)
  backend: "pipeline"
  # 计算设备: auto (自动检测), cuda (GPU), cpu, npu
  device: "auto"

  # 模型来源: huggingface, modelscope, local
  # 推荐新电脑先用 huggingface/modelscope；离线部署再切换 local。
  model_source: "huggingface"
  # 本地模型配置文件路径。留空时由 MinerU 默认逻辑或初始化脚本处理。
  mineru_tools_config_json: null
  # HuggingFace 缓存目录。留空表示使用系统默认缓存或环境变量。
  hf_home: null
  hf_hub_cache: null

  # 可选：显式指定 MinerU 所在 Python/CLI。留空时自动从当前环境和 PATH 中查找。
  python_exe: null
  mineru_cli_v3: null
  mineru_cli_v1: null

  # MinerU 子进程超时（秒）
  timeout: 600

# Pandoc 配置
pandoc:
  # Pandoc 可执行文件路径。默认从 PATH 查找；也可填绝对路径。
  path: "pandoc"
  # Word输出模板（可选）
  word_template: null
  # PDF引擎。默认从 PATH 查找 wkhtmltopdf；也可填绝对路径或改为 xelatex/weasyprint。
  pdf_engine: "wkhtmltopdf"
  # 默认输出格式
  default_format: "docx"
  # 额外参数
  extra_args:
    - "--toc"
    - "--toc-depth=3"

# Markdown 优化配置
markdown_optimizer:
  # 是否清理多余空行
  clean_empty_lines: true
  # 是否统一标题层级
  normalize_headers: true
  # 是否修复列表缩进
  fix_list_indent: true
  # 是否优化表格格式
  optimize_tables: true
  # 表格输出策略: markdown（HTML表格转Markdown）, preserve_html（尽量保留HTML表格）
  table_output_mode: "markdown"
  # 是否移除HTML标签
  remove_html_tags: false

# 水印去除配置
watermark_remover:
  # 去除模式: fast (快速，基于颜色阈值), deep (深度，基于边缘+频域分析)
  mode: "fast"
  # 快速模式：水印灰度范围（仅检测浅色水印，如浅灰/白色半透明水印）
  watermark_gray_range: [220, 255]
  # 最小水印面积（像素），低于此值的连通域不处理
  min_area: 500
  # Inpaint 修复半径，越大修复越平滑但越慢
  inpaint_radius: 5
  # 深度模式灵敏度 (0-1)，越高检测越灵敏但也越容易误伤正文
  deep_sensitivity: 0.3

# 输出配置
output:
  # 输出目录
  directory: "./output"
  # 文件命名规则: original, timestamp, custom
  naming: "original"
  # 是否覆盖已存在文件
  overwrite: false
  # 是否保留中间文件
  keep_intermediate: false
  # 是否写出质量报告 JSON。默认关闭，避免生成额外文件。
  write_quality_report: false
